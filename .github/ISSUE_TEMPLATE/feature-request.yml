name: "\U0001F680 Feature Request"
description: Submit a proposal or request for a new feature
labels: ["Feature request"]
body:
  - type: textarea
    id: feature-request
    validations:
      required: true
    attributes:
      label: Feature request
      description: |
        A clear and concise description of the feature you'd like to see.
        If this is related to an existing tool or component, please specify which one.

  - type: textarea
    id: motivation
    validations:
      required: true
    attributes:
      label: Motivation
      description: |
        Please outline the motivation for the proposal. Is your feature request related to a problem?
        e.g., "I'm always frustrated when [...]"
        If this is related to another GitHub issue, please link it here.

  - type: textarea
    id: contribution
    validations:
      required: true
    attributes:
      label: Your contribution
      description: |
        Is there any way that you could help, e.g. by submitting a PR?
        Make sure to read the [contributing guidelines](https://github.com/whats2000/isaacsim-mcp-server/blob/main/CONTRIBUTING.md).
